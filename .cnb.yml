# CNB 云原生开发：自定义镜像 + 启动后预热依赖
# 文档：https://docs.cnb.cool/zh/workspaces/custom-dev-env.html
$:
  vscode:
    - docker:
        # 优先用 .ide/Dockerfile 构建；失败时回退到平台默认环境
        build: .ide/Dockerfile
        image: cnbcool/default-dev-env:latest
      services:
        - vscode
        - docker
      stages:
        - name: toolchain
          script: rustc -Vv && cargo -Vv
        - name: fetch
          script: cargo fetch --workspace
